<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Loadro - Load Rates Optimized</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    .logo-load { font-family: system-ui, -apple-system, sans-serif; }
    .hero-bg { background: linear-gradient(135deg, #0A2540 0%, #1E3A8A 100%); }
  </style>
</head>
<body class="bg-gray-50 font-sans">

  <!-- Navigation -->
  <nav class="bg-white shadow-sm sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
      <div class="flex flex-col items-start">
        <div class="logo-load text-3xl font-bold tracking-tighter text-[#0A2540]">
          LOAD<span class="text-[#FF6200]">RO</span>
        </div>
        <div class="text-xs font-medium text-gray-500 tracking-widest -mt-1">
          LOAD RATES OPTIMIZED
        </div>
      </div>
      <a href="index.html" class="text-[#FF6200] font-medium hover:underline flex items-center gap-1">
        ← Back to Home
      </a>
    </div>
  </nav>

  <div class="min-h-screen flex items-center justify-center py-12 px-6">
    <div class="max-w-md w-full bg-white rounded-3xl shadow-xl overflow-hidden">
      
      <!-- Header -->
      <div class="hero-bg px-8 py-10 text-center text-white">
        <div class="logo-load text-4xl font-bold tracking-tighter mb-2">
          LOAD<span class="text-[#FF6200]">RO</span>
        </div>
        <p class="text-white/90 text-lg">Welcome back</p>
        <p class="text-sm text-white/70 mt-1">Sign in to access your optimized freight rates</p>
      </div>

      <!-- Login Form -->
      <div class="p-8">
        <form class="space-y-6">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Email Address</label>
            <input type="email" 
                   class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:border-[#FF6200] transition"
                   placeholder="you@company.com" required>
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Password</label>
            <input type="password" 
                   class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:border-[#FF6200] transition"
                   placeholder="••••••••" required>
          </div>

          <div class="flex items-center justify-between text-sm">
            <label class="flex items-center gap-2">
              <input type="checkbox" class="w-4 h-4 accent-[#FF6200]">
              <span class="text-gray-600">Remember me</span>
            </label>
            <a href="#" class="text-[#FF6200] hover:underline">Forgot password?</a>
          </div>

          <button type="submit"
                  class="w-full bg-[#FF6200] hover:bg-orange-600 text-white font-semibold py-4 rounded-2xl transition text-lg">
            Sign In
          </button>
        </form>

        <!-- Divider -->
        <div class="my-8 flex items-center">
          <div class="flex-1 border-t border-gray-200"></div>
          <span class="px-4 text-gray-400 text-sm">OR</span>
          <div class="flex-1 border-t border-gray-200"></div>
        </div>

        <!-- Social Login -->
        <div class="grid grid-cols-2 gap-4">
          <button class="flex items-center justify-center gap-3 border border-gray-300 hover:border-gray-400 py-3 rounded-2xl transition">
            <i class="fab fa-google text-red-500"></i>
            <span class="text-sm font-medium">Google</span>
          </button>
          <button class="flex items-center justify-center gap-3 border border-gray-300 hover:border-gray-400 py-3 rounded-2xl transition">
            <i class="fab fa-microsoft text-blue-600"></i>
            <span class="text-sm font-medium">Microsoft</span>
          </button>
        </div>

        <!-- Sign Up Link -->
        <div class="text-center mt-10 text-sm text-gray-600">
          Don't have an account? 
          <a href="#" class="text-[#FF6200] font-semibold hover:underline">Sign up free</a>
        </div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="bg-white border-t py-8">
    <div class="max-w-7xl mx-auto px-6 text-center text-xs text-gray-500">
      © 2026 Loadro.com — Load Rates Optimized. 
      <a href="terms.html" class="hover:text-gray-700">Terms</a> • 
      <a href="privacy.html" class="hover:text-gray-700">Privacy</a>
    </div>
  </footer>

</body>
</html>
